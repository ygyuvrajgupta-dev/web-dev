<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#1f2c5c,#243b6b);
color:white;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.search-box, .weather-box{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:300px;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
background:#ff7b2c;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#e0641f;
}

.console{
margin-top:20px;
background:#0f1b3d;
padding:20px;
width:650px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
}

.error{
color:red;
}

li{
cursor:pointer;
margin:5px;
}

</style>

</head>

<body>

<h1>☁ Async Weather Tracker</h1>

<div class="container">

<div class="search-box">

<h3>Search City</h3>

<input type="text" id="cityInput" placeholder="Enter city name">
<button id="searchBtn">Search</button>

<h4>Search History</h4>
<ul id="history"></ul>

</div>

<div class="weather-box">

<h3>Weather Info</h3>

<p><strong>City:</strong> <span id="city"></span></p>
<p><strong>Temp:</strong> <span id="temp"></span></p>
<p><strong>Weather:</strong> <span id="weather"></span></p>

<p id="error" class="error"></p>

</div>

</div>

<div class="console">

<h3>Console – Event Loop</h3>
<pre id="consoleLog"></pre>

</div>

<script>

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");

const cityEl = document.getElementById("city");
const tempEl = document.getElementById("temp");
const weatherEl = document.getElementById("weather");

const historyEl = document.getElementById("history");
const errorEl = document.getElementById("error");
const consoleLog = document.getElementById("consoleLog");


function log(msg){
console.log(msg);
consoleLog.textContent += msg + "\n";
}


searchBtn.addEventListener("click", () => {

const city = cityInput.value.trim();

if(city===""){
alert("Enter city name");
return;
}

getWeather(city);

});


cityInput.addEventListener("keypress", function(e){
if(e.key==="Enter"){
searchBtn.click();
}
});


async function getWeather(city){

log("1️⃣ Sync Start");

try{

log("2️⃣ Fetching weather...");

const response = await fetch(`https://wttr.in/${city}?format=j1`);

const data = await response.json();

log("3️⃣ Data received");

const weather = data.current_condition[0];

cityEl.textContent = city;
tempEl.textContent = weather.temp_C + " °C";
weatherEl.textContent = weather.weatherDesc[0].value;

errorEl.textContent="";

saveHistory(city);

cityInput.value="";

}
catch(error){

log("❌ Error occurred");

errorEl.textContent="City not found";

}

log("4️⃣ Async function finished");

}


function saveHistory(city){

let history = JSON.parse(localStorage.getItem("cities")) || [];

if(!history.includes(city)){
history.push(city);
localStorage.setItem("cities",JSON.stringify(history));
}

displayHistory();

}


function displayHistory(){

historyEl.innerHTML="";

let history = JSON.parse(localStorage.getItem("cities")) || [];

history.forEach(city=>{

let li=document.createElement("li");

li.textContent=city;

li.onclick=()=>getWeather(city);

historyEl.appendChild(li);

});

}


displayHistory();

</script>

</body>
</html>
