<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#1f2c5c,#243b6b);
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
flex-wrap:wrap;
}

.search-box, .weather-box{
background:white;
color:black;
padding:20px;
border-radius:12px;
width:300px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

input{
padding:10px;
width:70%;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px;
background:#ff7b2c;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#e0641f;
}

.console{
margin-top:20px;
background:#0f1b3d;
padding:20px;
width:650px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
text-align:left;
}

.error{
color:red;
}

li{
cursor:pointer;
margin:5px;
list-style:none;
padding:5px;
background:#eee;
border-radius:5px;
}

li:hover{
background:#ddd;
}

.loader{
color:#ff7b2c;
font-weight:bold;
}

.weather-icon{
width:80px;
margin-top:10px;
}

.clear-btn{
margin-top:10px;
background:#d9534f;
}

.clear-btn:hover{
background:#c9302c;
}

</style>

</head>

<body>

<h1>☁ Async Weather Tracker</h1>

<div class="container">

<div class="search-box">

<h3>Search City</h3>

<input type="text" id="cityInput" placeholder="Enter city name">
<button id="searchBtn">Search</button>

<h4>Search History</h4>
<ul id="history"></ul>

<button class="clear-btn" id="clearHistory">Clear History</button>

</div>

<div class="weather-box">

<h3>Weather Info</h3>

<p><strong>City:</strong> <span id="city"></span></p>
<p><strong>Temp:</strong> <span id="temp"></span></p>
<p><strong>Weather:</strong> <span id="weather"></span></p>

<img id="icon" class="weather-icon" src="" alt="">

<p id="loader" class="loader"></p>
<p id="error" class="error"></p>

</div>

</div>

<div class="console">

<h3>Console – Event Loop</h3>
<pre id="consoleLog"></pre>

</div>

<script>

const cityInput = document.getElementById("cityInput");
const searchBtn = document.getElementById("searchBtn");

const cityEl = document.getElementById("city");
const tempEl = document.getElementById("temp");
const weatherEl = document.getElementById("weather");
const iconEl = document.getElementById("icon");

const historyEl = document.getElementById("history");
const errorEl = document.getElementById("error");
const consoleLog = document.getElementById("consoleLog");
const loader = document.getElementById("loader");
const clearBtn = document.getElementById("clearHistory");


function log(msg){
console.log(msg);
consoleLog.textContent += msg + "\n";
}



searchBtn.addEventListener("click", () => {

const city = cityInput.value.trim();

if(city===""){
alert("Enter city name");
return;
}

getWeather(city);

});



cityInput.addEventListener("keypress", function(e){
if(e.key==="Enter"){
searchBtn.click();
}
});



async function getWeather(city){

log("1️⃣ Sync Start");

loader.textContent = "⏳ Loading...";
errorEl.textContent = "";

try{

log("2️⃣ Getting coordinates...");

const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`);
const geoData = await geoRes.json();

if(!geoData.results){
throw new Error("City not found");
}

const { latitude, longitude, name } = geoData.results[0];

log("3️⃣ Fetching weather...");


const weatherRes = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`
);

const weatherData = await weatherRes.json();

log("4️⃣ Data received");

const weather = weatherData.current_weather;


cityEl.textContent = name;
tempEl.textContent = weather.temperature + " °C";
weatherEl.textContent = "Wind Speed: " + weather.windspeed + " km/h";


iconEl.src = "https://cdn-icons-png.flaticon.com/128/869/869869.png";

saveHistory(city);

cityInput.value="";

}
catch(error){

log("❌ Error occurred");

errorEl.textContent="City not found";

cityEl.textContent="";
tempEl.textContent="";
weatherEl.textContent="";
iconEl.src="";

}

loader.textContent = "";

log("5️⃣ Async function finished");

}


function saveHistory(city){

let history = JSON.parse(localStorage.getItem("cities")) || [];

if(!history.map(c => c.toLowerCase()).includes(city.toLowerCase())){
history.push(city);
localStorage.setItem("cities",JSON.stringify(history));
}

displayHistory();

}


function displayHistory(){

historyEl.innerHTML="";

let history = JSON.parse(localStorage.getItem("cities")) || [];

history.forEach(city=>{

let li=document.createElement("li");

li.textContent=city;


li.onclick=()=>getWeather(city);


li.oncontextmenu = (e)=>{
e.preventDefault();
deleteCity(city);
};

historyEl.appendChild(li);

});

}



function deleteCity(city){

let history = JSON.parse(localStorage.getItem("cities")) || [];

history = history.filter(c => c !== city);

localStorage.setItem("cities",JSON.stringify(history));

displayHistory();

}



clearBtn.onclick = ()=>{
localStorage.removeItem("cities");
displayHistory();
};

displayHistory();

</script>

</body>
</html>
