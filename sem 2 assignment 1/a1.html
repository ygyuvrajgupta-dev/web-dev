<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Dashboard</title>
    <link rel="stylesheet" href="a1.css">
</head>
<style>
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
    background: linear-gradient(135deg, #78d6d6, #3b9090);
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

.dashboard-container { max-width: 1100px; margin: auto; }

header h1 {
    color: rgb(163, 41, 41);
    text-align: center;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.main-content {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: rgba(35, 13, 182, 0.115);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h2 { color: #ffffff; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

.form-group { margin-bottom: 15px; }
label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }

input, select, textarea {
    width: 100%;
    padding: 8px;
    border: 1px solid #b92b2b;
    border-radius: 4px;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #d7ff12;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

button:hover { opacity: 0.9; }

.button-group { display: flex; gap: 10px; }
.secondary-btn { background-color: #02c4ff; font-size: 0.8em; }

/* Event Card Styling */
.event-item {
    background: #f8f9fa;
    border-left: 5px solid #5bc0de;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 5px;
    position: relative;
}

.delete-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #491111;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    padding: 0;
    line-height: 20px;
}

.badge {
    background: #6a82fb;
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.7em;
}

.empty-msg { text-align: center; color: #888; margin-top: 50px; }

.key-display {
    margin-top: 15px;
    padding: 10px;
    border: 1px solid #ddd;
    background: #fff;
}
</style>
<body>
    <div class="dashboard-container">
        <header>
            <h1> Smart Event Dashboard</h1>
        </header>

        <main class="main-content">
            <!-- Left Side: Add Event Form -->
            <section class="card form-section">
                <h2>Add Event</h2>
                <form id="eventForm">
                    <div class="form-group">
                        <label>Event Title:</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>Event Date:</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Category:</label>
                        <select id="category">
                            <option value="Conference">Conference</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Meetup">Meetup</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Description:</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>
                    <button type="submit" id="addBtn">Add Event</button>
                </form>
            </section>

            <!-- Right Side: Event List -->
            <section class="card list-section">
                <div class="list-header">
                    <h2>My Events</h2>
                    <div class="button-group">
                        <button id="clearAllBtn" class="secondary-btn">Clear All Events</button>
                        <button id="addSampleBtn" class="secondary-btn">Add Sample Events</button>
                    </div>
                </div>
                <div id="eventContainer">
                    <p class="empty-msg">No events yet. Add your first event!</p>
                </div>
            </section>
        </main>

        <!-- Bottom: DOM Manipulation Demo -->
        <section class="card demo-section">
            <h2>DOM Manipulation Demo</h2>
            <div id="propertyDemo">
                <!-- Comparison logic will be injected here via JS -->
            </div>
            <div class="key-display">
                <strong>You Pressed:</strong> <span id="keyPressed">None</span>
            </div>
        </section>
    </div>
    <script src="a1.js"></script>
</body>
</html>
